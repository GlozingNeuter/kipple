<!DOCTYPE html>
<meta charset="utf-8">

<!-- Load d3.js -->
<script src="https://d3js.org/d3.v4.js"></script>

<!-- Create a div where the graph will take place -->
<div id="my_dataviz"></div>

<script>

  // set the dimensions and margins of the graph
  var width = 450
  var height = 450
  
  // append the svg object to the body of the page
  var svg = d3.select("#my_dataviz")
    .append("svg")
      .attr("width", 450)
      .attr("height", 450)
  
  // create dummy data -> just one element per circle
  var data = [  { "name": "2010",
                  "size": 14 ,
                  "allié" : [] ,
                },
                { "name": "2015",
                  "size": 14 ,
                  "allié" : ['RMDP', 'Synergie', 'Tout-en-un', 'RTC_Liège', 'Védia', 'Télésambre', 'Boukè', 'Matélé', 'Tvlux', 'Canal_Zoom', 'TV_Com', 'Antenne_Centre'] ,
                },
                { "name": "2017",
                  "size": 14 ,
                  "allié" : ['RMDP', 'Synergie', 'Tout-en-un', 'RTC_Liège', 'Védia', 'Télésambre', 'Matélé', 'Tvlux', 'Canal_Zoom', 'TV_Com', 'Antenne_Centre', 'Step2e', 'Phase_de_test'] ,
                },
                { "name": "2018",
                  "size": 13 ,
                  "allié" : ['RMDP', 'Synergie', 'Tout-en-un', 'RTC_Liège', 'Védia', 'Télésambre', 'Matélé', 'Tvlux', 'Canal_Zoom', 'TV_Com', 'Antenne_Centre', 'Phase_de_test'] ,
                },
                { "name": "Fin 2018",
                  "size": 3 ,
                  "allié" : ['RTC_Liège'] ,
                },
                { "name": "Juillet 2019",
                  "size": 17 ,
                  "allié" : ['RTC_Liège', 'DB_Step2e', 'MAM'] ,
                },
                { "name": "Juillet 2021",
                  "size": 18 ,
                  "allié" : ['Synergie', 'Tout-en-un*', 'RTC_Liège', 'DB_Step2e', 'MAM', 'Développeur_web', 'Export', 'Module_planning', 'Module_conduite', 'Védia*', 'Télésambre*', 'Boukè*', 'Matélé', 'Tvlux', 'Canal_Zoom', 'TV_Com', 'Antenne_Centre'] ,
                },
                { "name": "Août 2021",
                  "size": 19 ,
                  "allié" : ['Synergie', 'RTC_Liège', 'DB_Step2e', 'MAM', 'Développeur_web', 'Export', 'Module_planning', 'Module_conduite', 'Module_diffusion', 'Védia*', 'Télésambre*', 'Boukè*', 'Matélé', 'Tvlux', 'Canal_Zoom', 'TV_Com', 'Antenne_Centre'] ,
                },
                { "name": "Fin 2021",
                  "size": 20 ,
                  "allié" : ['Synergie', 'Tout-en-un', 'RTC_Liège', 'DB_Step2e', 'MAM', 'Développeur_web', 'Export', 'Module_planning', 'Module_conduite', 'Module_diffusion', 'Module_traffic', 'Védia*', 'Télésambre*', 'Boukè*', 'Matélé', 'Tvlux', 'Canal_Zoom', 'TV_Com', 'Antenne_Centre'] ,
                },
                { "name": "2022",
                  "size": 21 ,
                  "allié" : ['Synergie', 'Tout-en-un', 'RTC_Liège', 'DB_Step2e', 'MAM', 'Développeur_web', 'Export', 'Module_planning', 'Module_conduite', 'Module_diffusion', 'Module_traffic', 'Module_web', 'Védia*', 'Télésambre*', 'Boukè*', 'Matélé', 'Tvlux', 'Canal_Zoom', 'TV_Com', 'Antenne_Centre'] ,
                },
              ]
  

  console.log(data[0])
  console.log(data[1].allié)
  // Initialize the circle: all located at the center of the svg area
  var node = svg.append("g")
    .selectAll("circle")
    .data(data)
    .enter()
    .append("circle")
      .attr("r", function (d) { return d.size*2; } )
      .attr("cx", width / 2)
      .attr("cy", height / 2)
      .style("fill", "#69b3a2")
      .style("fill-opacity", 0.3)
      .attr("stroke", "#69a2b2")
      .style("stroke-width", 4)
      .call(d3.zoom().on("zoom", function () {
       svg.attr("transform", d3.event.transform)
      }))
  
    var subnode = svg.append("g1")
    .selectAll("circle")
    .data(data[1].allié)
    .enter()
    .append("circle")
      .attr("r", 20)
  // Features of the forces applied to the nodes:
  var simulation = d3.forceSimulation()
      .force("center", d3.forceCenter().x(width / 2).y(height / 2)) // Attraction to the center of the svg area
      .force("charge", d3.forceManyBody().strength(0.5)) // Nodes are attracted one each other of value is > 0
      .force("collide", d3.forceCollide().strength(.02).radius(function (d) { return d.size*2.3; }).iterations(1)) // Force that avoids circle overlapping
  
  // Apply these forces to the nodes and update their positions.
  // Once the force algorithm is happy with positions ('alpha' value is low enough), simulations will stop.
  simulation
      .nodes(data)
      .on("tick", function(d){
        node
            .attr("cx", function(d){ return d.x; })
            .attr("cy", function(d){ return d.y; })
      });
  
  
  </script>
